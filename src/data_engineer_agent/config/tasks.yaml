data_exploration_task:
  description: >
    Using the watsonx.data intelligence MCP server, explore the data environment
    for the user's request: {request}
    Discover available catalogs, schemas, and tables. Inspect relevant table
    schemas, column definitions, data types, and metadata. Identify any
    partitioning, clustering, or indexing information that may be relevant.
  expected_output: >
    A structured summary of the discovered data assets including:
    - Available catalogs and schemas
    - Relevant table names with their column definitions and data types
    - Partitioning or clustering details if applicable
    - Any notable metadata or data governance tags
  agent: data_engineer

data_query_task:
  description: >
    Based on the data exploration results, construct and execute optimized SQL
    queries against watsonx.data to fulfill the user's request: {request}
    Ensure queries are efficient, follow best practices, and handle edge cases
    such as null values, data type mismatches, and large dataset performance.
  expected_output: >
    - The SQL query or queries written and executed
    - Query results or a representative sample of the output
    - Explanation of the query logic and any optimizations applied
    - Performance considerations or recommendations
  agent: data_engineer

data_engineering_report_task:
  description: >
    Synthesize the findings from data exploration and query execution into a
    comprehensive data engineering report for the user's request: {request}
    Include actionable insights, data quality observations, pipeline recommendations,
    and any issues or anomalies discovered in the data.
  expected_output: >
    A detailed markdown report containing:
    - Executive summary of findings
    - Data asset overview (catalogs, schemas, tables explored)
    - Query results and key insights
    - Data quality observations and anomalies
    - Recommendations for data pipelines, transformations, or improvements
    - Next steps for the data engineering team
    Formatted as markdown without '```'
  agent: data_engineer
  context:
    - data_exploration_task
    - data_query_task

